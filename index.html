<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PR · Upper / Lower</title>
<meta name="theme-color" content="#20242F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PR U/L">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F2F5; --surface:#FFFFFF; --ink:#15171C; --slate:#20242F; --slate2:#2D3242;
    --muted:#697084; --muted2:#9aa0b0; --line:#E5E7EC;
    --accent:#FF4D2E; --accent-press:#E33C1E; --accent-soft:#FFE9E3;
    --green:#13A24A; --green-soft:#E7F6ED; --gold:#E9A100;
    --radius:16px; --radius-sm:11px;
    --shadow:0 1px 2px rgba(20,23,32,.05), 0 8px 24px rgba(20,23,32,.06);
    --maxw:580px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .cond{font-family:'Roboto Condensed','Inter',sans-serif;}
  h1,h2,h3{margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}

  /* ---------- App shell ---------- */
  #app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg)}
  .topbar{
    position:sticky;top:0;z-index:30;background:rgba(241,242,245,.86);
    backdrop-filter:saturate(160%) blur(10px);
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;padding:14px 18px;
    padding-top:calc(14px + env(safe-area-inset-top));
  }
  .brand{font-family:'Roboto Condensed';font-weight:700;letter-spacing:.06em;font-size:15px;text-transform:uppercase}
  .brand b{color:var(--accent)}
  .topbar .spacer{flex:1}
  .iconbtn{
    width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
    color:var(--slate);border:1px solid transparent;
  }
  .iconbtn:hover{background:#fff;border-color:var(--line)}
  .iconbtn svg{width:21px;height:21px}
  .backbtn{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-weight:600;font-size:14px;padding:6px 4px;margin:0}
  .backbtn svg{width:18px;height:18px}

  .wrap{padding:20px 18px 60px}

  /* ---------- Generic ---------- */
  .eyebrow{font-family:'Roboto Condensed';text-transform:uppercase;letter-spacing:.14em;font-weight:700;font-size:12px;color:var(--accent)}
  .lede{color:var(--muted);font-size:15px;line-height:1.55}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:#EEF0F4;color:var(--muted)}

  /* ---------- Setup screen ---------- */
  .hero{padding:30px 4px 8px}
  .hero h1{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:38px;line-height:.96;letter-spacing:.005em}
  .hero h1 .u{color:var(--accent)}
  .hero p{margin:14px 2px 0}
  .steplabel{font-family:'Roboto Condensed';text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-size:13px;color:var(--ink);margin:30px 2px 12px;display:flex;gap:9px;align-items:center}
  .steplabel .n{width:22px;height:22px;border-radius:7px;background:var(--slate);color:#fff;display:grid;place-items:center;font-size:12px}
  .choices{display:grid;gap:12px}
  .choice{
    text-align:left;width:100%;padding:18px;border-radius:var(--radius);border:1.5px solid var(--line);background:#fff;
    display:flex;gap:15px;align-items:flex-start;transition:border-color .15s, background .15s, transform .05s;
  }
  .choice:active{transform:scale(.992)}
  .choice .ic{flex:0 0 auto;width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:#F0F1F5;color:var(--slate)}
  .choice .ic svg{width:24px;height:24px}
  .choice h3{font-size:17px;font-weight:700}
  .choice p{margin:3px 0 0;color:var(--muted);font-size:13.5px;line-height:1.45}
  .choice[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-soft)}
  .choice[aria-pressed="true"] .ic{background:var(--accent);color:#fff}
  .choice .check{margin-left:auto;align-self:center;color:var(--accent);opacity:0;transition:opacity .15s}
  .choice[aria-pressed="true"] .check{opacity:1}
  .choice .check svg{width:22px;height:22px}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:var(--accent);color:#fff;font-weight:700;font-size:16px;
    padding:16px;border-radius:14px;transition:background .15s, transform .05s, opacity .15s;
    font-family:'Inter';
  }
  .btn:hover{background:var(--accent-press)}
  .btn:active{transform:scale(.99)}
  .btn:disabled{opacity:.4;background:var(--muted2);cursor:not-allowed}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn.ghost:hover{background:#F7F8FA}
  .btn.dark{background:var(--slate)}
  .btn.dark:hover{background:#171a23}
  .btn svg{width:20px;height:20px}
  .stickybar{position:sticky;bottom:0;margin:26px -18px -60px;padding:16px 18px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, var(--bg) 62%, rgba(241,242,245,0));}

  /* ---------- Home ---------- */
  .greet h1{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:30px;line-height:1;margin-top:6px}
  .statrow{display:flex;gap:10px;margin:16px 0 4px}
  .stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px}
  .stat .v{font-family:'Roboto Condensed';font-weight:700;font-size:26px;line-height:1}
  .stat .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:5px}

  .next{
    margin-top:22px;border-radius:var(--radius);overflow:hidden;background:var(--slate);color:#fff;
    box-shadow:0 14px 30px rgba(20,23,32,.18);position:relative;
  }
  .next::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;
    background:radial-gradient(circle at center, rgba(255,77,46,.5), transparent 70%)}
  .next .inner{padding:22px;position:relative;z-index:1}
  .next .tag{font-family:'Roboto Condensed';letter-spacing:.14em;text-transform:uppercase;font-size:12px;font-weight:700;color:#ffb4a4}
  .next h2{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:34px;line-height:.98;margin:7px 0 4px}
  .next .meta{color:#c6cad6;font-size:13.5px}
  .next .go{margin-top:18px}
  .next .go .btn{background:var(--accent)}
  .next .go .btn:hover{background:var(--accent-press)}

  .sectitle{font-family:'Roboto Condensed';text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-size:14px;color:var(--muted);margin:30px 2px 12px}
  .wlist{display:grid;gap:10px}
  .wrow{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:var(--radius-sm);background:#fff;border:1px solid var(--line);text-align:left;width:100%;transition:border-color .12s, transform .05s}
  .wrow:active{transform:scale(.994)}
  .wrow:hover{border-color:#d3d6dd}
  .wrow .badge{flex:0 0 auto;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-family:'Roboto Condensed';font-weight:700;font-size:13px;letter-spacing:.02em;text-transform:uppercase;text-align:center;line-height:1}
  .badge.up{background:#FFEDE8;color:var(--accent)}
  .badge.lo{background:#E9EEFB;color:#3858C6}
  .wrow .tt{flex:1}
  .wrow .tt h3{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:18px}
  .wrow .tt p{margin:1px 0 0;font-size:12.5px;color:var(--muted)}
  .wrow .arrow{color:var(--muted2)}
  .wrow .arrow svg{width:20px;height:20px}

  .weekcard{margin-top:14px;padding:16px 18px}
  .week{display:flex;gap:6px;justify-content:space-between;margin-top:12px}
  .day{flex:1;text-align:center}
  .day .dl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
  .day .dv{margin-top:6px;height:34px;border-radius:9px;display:grid;place-items:center;font-family:'Roboto Condensed';font-weight:700;font-size:12px;letter-spacing:.02em;background:#F1F2F5;color:var(--muted2)}
  .day .dv.up{background:#FFEDE8;color:var(--accent)}
  .day .dv.lo{background:#E9EEFB;color:#3858C6}

  .guidelink{margin-top:14px;display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--radius-sm);background:#fff;border:1px solid var(--line);width:100%;text-align:left}
  .guidelink:hover{border-color:#d3d6dd}
  .guidelink .ic{width:42px;height:42px;border-radius:11px;background:#F0F1F5;display:grid;place-items:center;color:var(--slate)}
  .guidelink .ic svg{width:22px;height:22px}
  .guidelink h3{font-size:15.5px;font-weight:700}
  .guidelink p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}
  .guidelink .arrow{margin-left:auto;color:var(--muted2)}

  .reset{display:block;margin:34px auto 0;color:var(--muted2);font-size:13px;font-weight:600;text-align:center}

  /* tiles / history / deload */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .tile.wide{grid-column:1/-1}
  .tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px;text-align:left;transition:border-color .12s,transform .05s}
  .tile:hover{border-color:#d3d6dd}
  .tile:active{transform:scale(.99)}
  .tile .ti{width:38px;height:38px;border-radius:10px;background:#F0F1F5;display:grid;place-items:center;color:var(--slate)}
  .tile .ti svg{width:20px;height:20px}
  .tile h3{font-size:15px;font-weight:700;margin-top:11px}
  .tile p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}

  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty svg{width:40px;height:40px;color:var(--muted2);margin-bottom:10px}
  .empty h3{font-size:17px;color:var(--ink);font-weight:700}
  .empty p{margin:8px auto 0;max-width:300px;font-size:14px;line-height:1.5}

  .dstatus{display:flex;gap:14px;align-items:center;background:var(--slate);color:#fff;border-radius:var(--radius);padding:18px;margin-top:16px}
  .dstatus.muted{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .dstatus .ds-ic{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.14);display:grid;place-items:center}
  .dstatus.muted .ds-ic{background:#F0F1F5;color:var(--slate)}
  .dstatus .ds-ic svg{width:23px;height:23px}
  .dstatus .ds-t{font-size:12px;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .dstatus .ds-v{font-family:'Roboto Condensed';font-weight:700;font-size:20px;margin-top:3px}
  .dstatus .ds-s{font-size:12.5px;opacity:.78;margin-top:3px}
  .dstatus.muted .ds-s{opacity:1;color:var(--muted)}

  .dblock{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:12px}
  .dblock .dh{display:flex;align-items:center;gap:9px;font-family:'Roboto Condensed';text-transform:uppercase;letter-spacing:.04em;font-weight:700;font-size:16px;margin-bottom:11px}
  .dblock .dh svg{width:19px;height:19px;color:var(--accent)}
  .dblock p{margin:0 0 9px;font-size:14.5px;line-height:1.55;color:var(--slate)}
  .dblock p:last-child{margin-bottom:0}
  .dblock b{font-weight:700}
  .dblock ul{margin:4px 0 0;padding-left:18px}
  .dblock li{margin-bottom:6px;font-size:14.5px;line-height:1.5;color:var(--slate)}

  /* ---------- Workout screen ---------- */
  .whead{background:var(--slate);color:#fff;border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
  .whead::after{content:"";position:absolute;right:-50px;bottom:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle, rgba(255,77,46,.28), transparent 70%)}
  .whead .tag{font-family:'Roboto Condensed';letter-spacing:.14em;text-transform:uppercase;font-size:12px;font-weight:700;color:#ffb4a4;position:relative;z-index:1}
  .whead h1{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:34px;line-height:.98;margin:6px 0 16px;position:relative;z-index:1}
  .progress{position:relative;z-index:1}
  .progress .pbar{height:9px;border-radius:99px;background:rgba(255,255,255,.16);overflow:hidden}
  .progress .pfill{height:100%;background:var(--accent);border-radius:99px;transition:width .35s ease}
  .progress .pl{display:flex;justify-content:space-between;margin-top:9px;font-size:12.5px;color:#c6cad6;font-weight:600}

  .exlist{margin-top:16px;display:grid;gap:12px}
  .ex{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
  .ex.done{border-color:var(--green)}
  .ex .exhead{display:flex;gap:13px;align-items:flex-start;padding:16px}
  .ex .num{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--slate);color:#fff;display:grid;place-items:center;font-family:'Roboto Condensed';font-weight:700;font-size:15px}
  .ex.done .num{background:var(--green)}
  .ex .nm{flex:1;min-width:0}
  .ex .nm h3{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:18px;line-height:1.05;letter-spacing:.01em}
  .ex .techs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tch{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
  .tch.rp{background:#FFF1D6;color:#9a6b00}
  .tch.ds{background:#E4E9FB;color:#3650b8}
  .tch.note{background:#EEF0F4;color:var(--muted)}
  .ex .donemark{flex:0 0 auto;color:var(--green);opacity:0;transition:opacity .2s}
  .ex.done .donemark{opacity:1}
  .ex .donemark svg{width:24px;height:24px}

  .exbody{padding:0 16px 16px}
  .gr{font-size:13.5px;color:var(--muted);line-height:1.5;background:#F7F8FA;border-radius:10px;padding:11px 13px;margin-bottom:14px}
  .gr b{color:var(--slate);font-weight:600}

  .setrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .setrow:first-of-type{border-top:none}
  .setrow .sn{flex:0 0 auto;width:58px}
  .setrow .sn .s1{font-family:'Roboto Condensed';font-weight:700;font-size:13px;text-transform:uppercase;color:var(--muted)}
  .setrow .sn .s2{font-family:'Roboto Condensed';font-weight:700;font-size:19px;color:var(--ink);line-height:1}
  .setrow .reptip{font-size:11px;color:var(--muted2);margin-top:1px;white-space:nowrap}
  .fields{flex:1;display:flex;gap:8px}
  .field{flex:1;position:relative}
  .field input{
    width:100%;border:1.5px solid var(--line);border-radius:10px;background:#fff;
    padding:11px 11px 11px 11px;font-size:15px;font-weight:600;text-align:center;color:var(--ink);
    -moz-appearance:textfield;
  }
  .field input::-webkit-outer-spin-button,.field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .field input::placeholder{color:var(--muted2);font-weight:500}
  .field input:focus{outline:none;border-color:var(--slate)}
  .field .lab{position:absolute;top:-7px;left:9px;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted2);background:#fff;padding:0 4px}
  .logbtn{flex:0 0 auto;width:46px;height:44px;border-radius:11px;border:1.5px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--muted2);transition:.12s}
  .logbtn:hover{border-color:var(--slate);color:var(--slate)}
  .logbtn svg{width:22px;height:22px}
  .setrow.logged .logbtn{background:var(--green);border-color:var(--green);color:#fff}
  .setrow.logged .field input{background:var(--green-soft);border-color:var(--green-soft);color:#0c6e34}
  .setrow .last{font-size:10.5px;color:var(--muted2);margin-top:3px;text-align:center;height:13px}
  .setcol{flex:1}

  .setctl{display:flex;align-items:center;gap:8px;margin-top:11px}
  .sc{font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--slate)}
  .sc:disabled{opacity:.35}
  .sc:hover:not(:disabled){border-color:var(--slate)}
  .setctl .scn{font-size:11.5px;color:var(--muted2);font-weight:600;margin-left:auto}
  .restzone{margin:6px 0 0;padding-top:13px;border-top:1px dashed var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .restzone .rl{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .restzone .rl svg{width:15px;height:15px}
  .rchip{font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;background:#F1F2F5;color:var(--slate)}
  .rchip:hover{background:#e7e9ee}

  .finishwrap{margin-top:20px}

  /* ---------- Rest timer overlay ---------- */
  .timer{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;pointer-events:none;padding:0 12px calc(14px + env(safe-area-inset-bottom))}
  .timer .box{pointer-events:auto;width:100%;max-width:calc(var(--maxw) - 24px);background:var(--slate);color:#fff;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 14px 40px rgba(0,0,0,.3)}
  .timer .tnum{font-family:'Roboto Condensed';font-weight:700;font-size:30px;line-height:1;letter-spacing:.02em;min-width:84px}
  .timer .tnum.low{color:#ff8a72}
  .timer .tl{font-size:12px;color:#c6cad6;font-weight:600}
  .timer .tbtns{margin-left:auto;display:flex;gap:8px}
  .timer .tbtns button{background:rgba(255,255,255,.12);color:#fff;border-radius:10px;padding:9px 12px;font-weight:700;font-size:13px}
  .timer .tbtns button:hover{background:rgba(255,255,255,.22)}
  .timer .tbtns .close{background:transparent;padding:9px}
  .timer .tbtns .close svg{width:18px;height:18px;display:block}

  /* ---------- Guide ---------- */
  .gtitle h1{font-family:'Roboto Condensed';text-transform:uppercase;font-weight:700;font-size:30px;line-height:1;margin-top:6px}
  .acc{margin-top:14px;display:grid;gap:10px}
  .ac{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .ac>button{width:100%;display:flex;align-items:center;gap:13px;padding:16px;text-align:left}
  .ac .ai{flex:0 0 auto;width:38px;height:38px;border-radius:10px;background:#F0F1F5;display:grid;place-items:center;color:var(--slate)}
  .ac .ai svg{width:20px;height:20px}
  .ac h3{flex:1;font-size:16px;font-weight:700}
  .ac .chev{color:var(--muted2);transition:transform .2s}
  .ac .chev svg{width:20px;height:20px;display:block}
  .ac.open .chev{transform:rotate(180deg)}
  .ac .panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .ac.open .panel{max-height:900px}
  .ac .panel .pin{padding:0 16px 18px;color:var(--slate);font-size:14.5px;line-height:1.62}
  .ac .panel .pin p{margin:0 0 11px}
  .ac .panel .pin p:last-child{margin-bottom:0}
  .ac .panel .pin b{font-weight:700}
  .ac .panel .pin .hl{background:var(--accent-soft);color:var(--accent-press);font-weight:600;padding:1px 6px;border-radius:6px}
  .ac .panel .pin ul{margin:4px 0 11px;padding-left:18px}
  .ac .panel .pin li{margin-bottom:5px}

  .footnote{margin:26px 2px 0;font-size:12px;color:var(--muted2);line-height:1.55}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}

  .storebanner{
    position:fixed;left:50%;transform:translate(-50%,140%);bottom:calc(14px + env(safe-area-inset-bottom));
    z-index:60;width:calc(100% - 28px);max-width:calc(var(--maxw) - 28px);

/* Φύλακας εκκίνησης: τρέχει ΠΡΙΝ το κυρίως script ώστε να πιάνει και parse errors */
window.__errs=[];window.__booted=false;
window.addEventListener('error',function(e){window.__errs.push((e.message||'σφάλμα')+(e.lineno?(' @'+e.lineno):''));});
window.addEventListener('unhandledrejection',function(e){window.__errs.push('Promise: '+((e.reason&&e.reason.message)||e.reason||'άγνωστο'));});
setTimeout(function(){
  if(window.__booted) return;
  var b=document.getElementById('boot'); if(!b) return;
  b.innerHTML='<div style="font-family:sans-serif;max-width:420px;padding:0 10px;text-align:center">'
    +'<div style="font-weight:700;font-size:18px;color:#20242F">Η εφαρμογή δεν φόρτωσε</div>'
    +'<p style="color:#697084;font-size:13px;margin:10px 0;word-break:break-word">'+(window.__errs.length?('Σφάλμα: '+window.__errs.join(' · ')):'Πιθανόν παλιά προσωρινή μνήμη (cache).')+'</p>'
    +'<button id="fixbtn" style="background:#FF4D2E;color:#fff;border:0;border-radius:12px;padding:14px 18px;font-size:15px;font-weight:700;width:100%;cursor:pointer">🔧 Επιδιόρθωση & επανεκκίνηση</button></div>';
  document.getElementById('fixbtn').onclick=function(){
    var done=function(){ location.replace(location.pathname+'?r='+Date.now()); };
    try{
      var p=[];
      if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations){
        p.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));}));
      }
      if(window.caches&&caches.keys){
        p.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));}));
      }
      Promise.all(p).then(done,done); setTimeout(done,3000);
    }catch(err){ done(); }
  };
},5000);
</script>

/* Universal persistence: works inside Claude (window.storage), as a shared/
   downloaded file (localStorage on each person's own device), or in-memory. */
const _mem={};
let backend='mem'; // 'cloud' | 'local' | 'mem'
async function probeBackend(){
  try{
    if(typeof window!=='undefined' && window.storage && window.storage.set){
      await window.storage.set('pruplo_probe','1',false);
      try{ await window.storage.delete('pruplo_probe',false); }catch(e){}
      backend='cloud'; return;
    }
  }catch(e){}
  try{
    localStorage.setItem('pruplo_probe','1'); localStorage.removeItem('pruplo_probe');
    backend='local'; return;
  }catch(e){}
  backend='mem';
}
async function sGet(key){
  try{
    if(backend==='cloud'){ const r=await window.storage.get(key,false); return r? r.value : null; }
    if(backend==='local'){ return localStorage.getItem(key); }
    return (key in _mem)? _mem[key] : null;
  }catch(e){ return null; }
}
async function sSet(key,val){
  const s=JSON.stringify(val);
  try{
    if(backend==='cloud'){ await window.storage.set(key,s,false); return; }
    if(backend==='local'){ localStorage.setItem(key,s); return; }
    _mem[key]=s;
  }catch(e){ _mem[key]=s; }
}
async function sDel(key){
  try{
    if(backend==='cloud'){ await window.storage.delete(key,false); return; }
    if(backend==='local'){ localStorage.removeItem(key); return; }
    delete _mem[key];
  }catch(e){}
}

}

async function loadAll(){
  const set = await sGet(K_SET);
  if(set){ try{ const o=JSON.parse(set);
    S.level=o.level; S.days=o.days; S.rollingIndex=o.rollingIndex||0;
    S.completedCount=o.completedCount||0; S.setupDone=!!o.setupDone;
    S.lastDeload=o.lastDeload||null;
  }catch(e){} }
  const log = await sGet(K_LOG);
  if(log){ try{ const o=JSON.parse(log); S.lastlog={basic:o.basic||{},advanced:o.advanced||{}}; }catch(e){} }
  const act = await sGet(K_ACT);
  if(act){ try{ S.active=JSON.parse(act); }catch(e){} }
  // v2: καρδιο-ασφαλές πρόγραμμα — παλιά ενεργή προπόνηση δεν ταιριάζει πια
  const pv = await sGet('pruplo_progv'); let pvn=null; try{ pvn=JSON.parse(pv); }catch(e){}
  if(pvn!==3){
    S.active=null; sDel(K_ACT);
    S.lastlog.advanced={}; saveLog(); /* η Προχωρημένη επέστρεψε στο αρχικό πρόγραμμα */
    sSet('pruplo_progv',3);
  }
  const hist = await sGet(K_HIST);
  if(hist){ try{ const o=JSON.parse(hist); if(Array.isArray(o)) S.history=o; }catch(e){} }
  S.view = S.setupDone ? 'home' : 'setup';
}
function saveSettings(){ sSet(K_SET,{level:S.level,days:S.days,rollingIndex:S.rollingIndex,completedCount:S.completedCount,setupDone:S.setupDone,lastDeload:S.lastDeload}); }
function saveLog(){ sSet(K_LOG,S.lastlog); }
function saveActive(){ if(S.active) sSet(K_ACT,S.active); else sDel(K_ACT); }
function saveHistory(){ sSet(K_HIST,S.history); }

/* ============ HELPERS ============ */
const $ = sel => document.querySelector(sel);
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function workoutDef(level,id){ return WK[level][id]; }
function totalSets(def){ return def.ex.reduce((a,e)=>a+e.sets.length,0); }
function activeTotal(a,def){ return def.ex.reduce((n,e,i)=>n+((a&&a.sets&&a.sets[i])?a.sets[i].length:e.sets.length),0); }
function loggedSets(active){
  let n=0; if(!active) return 0;
  Object.values(active.sets).forEach(arr=>arr.forEach(s=>{ if(s.logged) n++; }));
  return n;
}
const GR_MONTHS=['Ιαν','Φεβ','Μαρ','Απρ','Μαΐ','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];
function formatDate(iso){
  const d=new Date(iso);
  const t=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${d.getDate()} ${GR_MONTHS[d.getMonth()]} ${d.getFullYear()} · ${t}`;
}
function daysSince(iso){ return Math.max(0,Math.floor((Date.now()-new Date(iso).getTime())/86400000)); }

function ensureActive(level,id,isRolling){
  if(S.active && S.active.level===level && S.active.id===id) return;
  const def=workoutDef(level,id);
  const sets={};
  def.ex.forEach((e,i)=>{ sets[i]=e.sets.map(()=>({w:'',r:'',logged:false})); });
  S.active={level,id,isRolling:!!isRolling,sets};
  saveActive();
}

/* ---- PROGRESS ---- */
function progressData(){
  const map={};
  S.history.forEach(h=>{ (h.detail||[]).forEach(d=>{
    if(!map[d.n]) map[d.n]=[];
    let vol=0, maxw=0, reps=0;
    d.sets.forEach(x=>{ const w=parseFloat(String(x.w||'').replace(',','.'))||0; const r=parseInt(x.r)||0; vol+=w*r; reps+=r; if(w>maxw)maxw=w; });
    map[d.n].push({date:h.date, vol, maxw, reps});
  });});
  return map;
}
function chartSVG(points){
  const W=560,H=170,P=16;
  const mx=Math.max(...points), mn=Math.min(...points);
  const span=(mx-mn)||1;
  const xs=points.map((v,i)=>P+i*(W-2*P)/(points.length-1));
  const ys=points.map(v=> mx===mn ? H/2 : H-P-(v-mn)/span*(H-2*P));
  const line=xs.map((x,i)=>`${i?'L':'M'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const dots=xs.map((x,i)=>`<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4.5" fill="#FF4D2E"/>`).join('');
  return `<svg class="progchart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Γράφημα προόδου">
    <path d="${line}" fill="none" stroke="#FF4D2E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}
function viewProgress(){
  const data=progressData();
  const names=Object.keys(data);
  const head=`<div class="gtitle"><div class="eyebrow">Η δουλειά σου</div><h1>Πρόοδος</h1></div>`;
  if(!names.length){
    return `<div class="wrap">${head}
      <div class="progempty">Δεν υπάρχουν ακόμη δεδομένα.<br>Ολοκλήρωσε 1-2 προπονήσεις και εδώ θα βλέπεις την πορεία σου σε κάθε άσκηση.</div></div>`;
  }
  if(!S.progressEx || !data[S.progressEx]) S.progressEx=names[0];
  const rows=data[S.progressEx];
  const metric = rows.some(r=>r.vol>0) ? 'vol' : 'reps';
  const pts=rows.map(r=>metric==='vol'?r.vol:r.reps);
  const lastR=rows[rows.length-1];
  const opts=names.map(n=>`<option value="${esc(n)}" ${n===S.progressEx?'selected':''}>${esc(n)}</option>`).join('');
  return `<div class="wrap">${head}
    <select class="progsel" data-sel="progress" aria-label="Διάλεξε άσκηση">${opts}</select>
    <div class="progcard">
      <div class="progstats">
        <div class="ps"><div class="v">${rows.length}</div><div class="l">Φορές</div></div>
        <div class="ps"><div class="v">${lastR.maxw||'—'}</div><div class="l">Τελ. κιλά</div></div>
        <div class="ps"><div class="v">${pts[pts.length-1]}</div><div class="l">${metric==='vol'?'Τελ. όγκος':'Τελ. επαν.'}</div></div>
      </div>
      ${pts.length>1? chartSVG(pts) : `<div class="progempty">Χρειάζεται μία ακόμη προπόνηση για να σχηματιστεί γραμμή.</div>`}
      <div class="prognote">${metric==='vol'?'Όγκος (κιλά × επαναλήψεις) ανά προπόνηση.':'Συνολικές επαναλήψεις ανά προπόνηση.'} Με ασφαλή φορτία, η πρόοδος φαίνεται στις επαναλήψεις και στον έλεγχο — όχι στα βαριά κιλά.</div>
    </div>
  </div>`;
}

/* ============ TIMER ============ */
let timer = { id:null, left:0, total:0 };
function startRest(sec){
  stopRest(true);
  timer.left=sec; timer.total=sec;
  renderTimer();
  timer.id=setInterval(()=>{
    timer.left--;
    if(timer.left<=0){ stopRest(); renderTimer(); return; }
    renderTimer();
  },1000);
}
function stopRest(silent){
  if(timer.id){ clearInterval(timer.id); timer.id=null; }
  timer.left=0;
  if(!silent) renderTimer();
}
function renderTimerMount(){ renderTimer(); }
function renderTimer(){
  const mount=$('#timerMount'); if(!mount) return;
  if(timer.left<=0){ mount.innerHTML=''; return; }
  const m=Math.floor(timer.left/60), s=timer.left%60;
  const low = timer.left<=10;
  mount.innerHTML=`<div class="timer"><div class="box">
    <div class="tnum ${low?'low':''}">${m}:${String(s).padStart(2,'0')}</div>
    <div class="tl">Διάλειμμα<br>μέχρι το επόμενο σετ</div>
    <div class="tbtns">
      <button data-action="restadd" data-s="30">+30''</button>
      <button class="close" data-action="reststop" aria-label="Κλείσιμο">${ICON.x}</button>
    </div>
  </div></div>`;
}

        ${info.en&&info.en!==name?`<div class="en">${esc(info.en)}</div>`:''}

/* ============ ΠΑΛΜΟΙ ΑΠΟ ΥΓΕΙΑ (Health / Bevel) ============ */
function openHrImport(){
  $('#exSheetBody').innerHTML=`
    <div class="sheet-top">
      <div><h3 id="exSheetTitle">Παλμοί από Υγεία</h3><div class="en">Τα ίδια δεδομένα που βλέπει και το Bevel</div></div>
      <button class="close" data-action="exclose" aria-label="Κλείσιμο">${ICON.x}</button>
    </div>
    <div class="block"><div class="lbl">Πώς</div>
      <p>Τρέξε στο iPhone το Shortcut «Παλμοί προπόνησης» (οδηγίες: Οδηγός → «Παλμοί από Υγεία / Bevel»), και επικόλλησε εδώ ό,τι αντέγραψε.</p></div>
    <textarea class="hrta" id="hrJson" placeholder='{"date":"2026-07-08","avg":96,"max":138}'></textarea>
    <div class="hrres" id="hrResult"></div>
    <button class="vid" data-action="hrapply" style="border:0;cursor:pointer;font-family:inherit">${ICON.check} Εισαγωγή</button>`;
  exInfoLastFocus=document.activeElement;
  $('#exScrim').classList.add('open'); $('#exSheet').classList.add('open');
  document.body.style.overflow='hidden';
  $('#hrJson').focus();
}
function importHR(txt){
  let data;
  try{ data=JSON.parse(txt); }catch(e){ return {matched:0,msg:'Δεν είναι έγκυρο JSON — αντέγραψε ακριβώς ό,τι έδωσε το Shortcut.'}; }
  if(!Array.isArray(data)) data=[data];
  let matched=0, nomatch=0, bad=0;
  data.forEach(d=>{
    if(!d||!d.date){ bad++; return; }
    const avg=Math.round(parseFloat(d.avg))||null, max=Math.round(parseFloat(d.max))||null;
    if(!avg&&!max){ bad++; return; }
    const key=/^\d{4}-\d{2}-\d{2}$/.test(String(d.date)) ? String(d.date) : dayKey(d.date);
    const cands=S.history.filter(h=>h.date&&dayKey(h.date)===key);
    if(!cands.length){ nomatch++; return; }
    const target=cands.find(h=>!h.hr)||cands[cands.length-1];
    target.hr={avg,max};
    matched++;
  });
  if(matched) saveHistory();
  let msg=matched?`✅ Καταχωρήθηκαν παλμοί σε ${matched} προπόνηση(-εις).`:'';
  if(nomatch) msg+=` ⚠ ${nomatch} εγγραφή(-ές) δεν ταίριαξαν με ημέρα προπόνησης στο ιστορικό.`;
  if(bad) msg+=` ⚠ ${bad} εγγραφή(-ές) χωρίς date/avg/max — αγνοήθηκαν.`;
  return {matched,msg:msg||'Δεν βρέθηκε τίποτα προς εισαγωγή.'};
}

/* ============ EVENTS ============ */
// capture input values live into state (no re-render, keeps focus)
let inputSaveT=null;
window.addEventListener('pagehide',()=>{ if(S.active) saveActive(); });
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden'&&S.active) saveActive(); });

document.addEventListener('input', e=>{
  const inp=e.target;
  if(inp.dataset && inp.dataset.f && S.active){
    const ei=+inp.dataset.ex, si=+inp.dataset.si, f=inp.dataset.f;
    if(S.active.sets[ei] && S.active.sets[ei][si]){
      S.active.sets[ei][si][f]=inp.value;
      clearTimeout(inputSaveT); inputSaveT=setTimeout(saveActive,400);
    }
    if(f==='w' && S.active.level==='basic'){
      const over=overLimit(inp.value);
      inp.classList.toggle('overw',over);
      const row=inp.closest('.setcol'); const warn=row&&row.querySelector('.wwarn');
      if(warn) warn.style.display=over?'block':'none';
    }
  }
});

document.addEventListener('change', e=>{
  const t=e.target;
  if(t.dataset && t.dataset.sel==='progress'){ S.progressEx=t.value; render(); }
});

document.addEventListener('click', e=>{
  const t=e.target.closest('[data-action]');
  if(!t) return;
  const act=t.dataset.action;

  switch(act){
    case 'picklevel': S.pickLevel=t.dataset.v; render(); break;
    case 'pickdays': S.pickDays=t.dataset.v; render(); break;
    case 'finishsetup':
      if(S.pickLevel==='advanced' && !confirm('Η Προχωρημένη είναι το πλήρες αρχικό πρόγραμμα ΧΩΡΙΣ τους περιορισμούς του γιατρού (μπάρες, βαριά σετ, τεχνικές εξάντλησης).\n\nΣυνέχισε ΜΟΝΟ αν ο καρδιολόγος έχει αφαιρέσει τα όρια. Συνεχίζουμε;')) break;
      S.level=S.pickLevel; S.days=S.pickDays; S.setupDone=true; S.rollingIndex=0;
      saveSettings(); S.view='home'; render(); break;

    case 'home': S.view='home'; render(); break;
    case 'guide': S.view='guide'; S.openAcc=-1; render(); break;
    case 'history': S.view='history'; render(); break;
    case 'progress': S.view='progress'; render(); break;
    case 'deload': S.view='deload'; render(); break;
    case 'markdeload': S.lastDeload=new Date().toISOString(); saveSettings(); render(); break;
    case 'cleardeload':
      if(confirm('Καθάρισμα της ημερομηνίας τελευταίου deload;')){ S.lastDeload=null; saveSettings(); render(); }
      break;

    case 'start': ensureActive(S.level,t.dataset.id,false); S.view='workout'; render(); break;
    case 'startnext': ensureActive(S.level,ORDER[S.rollingIndex],true); S.view='workout'; render(); break;
    case 'resume': S.view='workout'; render(); break;

    case 'logset':{
      const ei=+t.dataset.ex, si=+t.dataset.si;
      const cell=S.active.sets[ei][si];
      // read latest input values in case they typed and didn't blur
      const wIn=document.querySelector(`input[data-f="w"][data-ex="${ei}"][data-si="${si}"]`);
      const rIn=document.querySelector(`input[data-f="r"][data-ex="${ei}"][data-si="${si}"]`);
      if(!cell.logged){
        if(wIn) cell.w=wIn.value; if(rIn) cell.r=rIn.value;
        cell.logged=true;
        saveActive();
        // auto-suggest a rest timer (medium) — gentle: 90s
        startRest(90);
      } else {
        cell.logged=false; saveActive();
      }
      render(); break;
    }

    case 'rpe':{
      const ei=+t.dataset.ex, si=+t.dataset.si;
      if(S.active && S.active.sets[ei] && S.active.sets[ei][si]){
        S.active.sets[ei][si].rpe=t.dataset.v;
        saveActive(); render();
      }
      break;
    }

    case 'exinfo':{
      if(!S.active) break;
      const def=workoutDef(S.active.level,S.active.id);
      const ex=def.ex[+t.dataset.ei];
      if(ex) openExInfo(ex.n);
      break;
    }
    case 'exclose': closeExInfo(); break;
    case 'hrimport': openHrImport(); break;
    case 'hrapply':{
      const r=importHR(($('#hrJson')||{}).value||'');
      const res=$('#hrResult'); if(res) res.textContent=r.msg;
      if(r.matched && S.view==='history') render();
      break;
    }

    case 'addset':{
      const arr=S.active&&S.active.sets[+t.dataset.ex];
      if(!arr||arr.length>=8) break;
      arr.push({w:'',r:'',logged:false});
      saveActive(); render(); break;
    }
    case 'delset':{
      const arr=S.active&&S.active.sets[+t.dataset.ex];
      if(!arr||arr.length<=1) break;
      if(arr[arr.length-1].logged && !confirm('Το τελευταίο σετ είναι καταχωρημένο. Να διαγραφεί;')) break;
      arr.pop();
      saveActive(); render(); break;
    }

    case 'rest': startRest(+t.dataset.s); break;
    case 'restadd': timer.left+=(+t.dataset.s); timer.total=Math.max(timer.total,timer.left); renderTimer(); break;
    case 'reststop': stopRest(); break;

    case 'finishworkout':{
      const a=S.active; const def=workoutDef(a.level,a.id); const wkLog=S.lastlog[a.level][a.id]||{};
      Object.entries(a.sets).forEach(([ei,arr])=>{
        const saved=arr.filter(s=>s.logged).map(s=>({w:s.w,r:s.r,rpe:s.rpe||null}));
        if(saved.length) wkLog[ei]=saved;
      });
      S.lastlog[a.level][a.id]=wkLog; saveLog();
      const detail=def.ex.map((e,ei)=>({n:e.n, sets:(a.sets[ei]||[]).filter(s=>s.logged).map(s=>({w:s.w,r:s.r,rpe:s.rpe||null}))})).filter(d=>d.sets.length);
      S.history.push({date:new Date().toISOString(), level:a.level, id:a.id, name:def.name, group:def.group, tag:def.tag, setsLogged:loggedSets(a), totalSets:activeTotal(a,def), detail});
      saveHistory();
      S.completedCount++;
      if(a.isRolling) S.rollingIndex=(S.rollingIndex+1)%4;
      saveSettings();
      S.active=null; saveActive();
      stopRest(true);
      S.view='home'; render(); break;
    }

    case 'acc':{ const i=+t.dataset.i; S.openAcc = (S.openAcc===i)?-1:i; render(); break; }

    case 'confirmreset':{
      if(confirm('Θέλεις να αλλάξεις επίπεδο/συχνότητα; Τα στατιστικά & το ιστορικό κιλών σου διατηρούνται, αλλά θα ξαναδιαλέξεις ρυθμίσεις.')){
        S.setupDone=false; S.pickLevel=S.level; S.pickDays=S.days;
        S.active=null; saveActive(); saveSettings();
        S.view='setup'; render();
      }
      break;
    }
  }
});
